<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Railtrace - Form Tamu</title>

<link rel="icon" href="logo.png">

<style>

body{
  margin:0;
  background:#f5f7fb;
  font-family:Arial,sans-serif;
}

.container{
  max-width:1000px;
  margin:auto;
  padding:40px 20px;
}

.card{
  background:#fff;
  padding:30px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,.08);
}

h1{
  margin-bottom:10px;
}

.subtitle{
  color:#666;
  margin-bottom:30px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.input-group{
  display:flex;
  flex-direction:column;
}

.input-group.full{
  grid-column:1 / -1;
}

label{
  margin-bottom:8px;
  font-weight:600;
}

input,
select{
  padding:15px;
  border:1px solid #ddd;
  border-radius:12px;
}

button{
  margin-top:25px;
  width:100%;
  padding:16px;
  border:none;
  border-radius:12px;
  background:#2563eb;
  color:white;
  font-size:16px;
  cursor:pointer;
}

.status{
  text-align:center;
  margin-top:20px;
  font-weight:bold;
}

@media(max-width:768px){
  .grid{
    grid-template-columns:1fr;
  }
}

</style>
</head>
<body>

<div class="container">

<div class="card">

<h1>Form Registrasi Tamu</h1>

<p class="subtitle">
Silakan isi data sebelum memasuki area kerja
</p>

<div class="grid">

<div class="input-group">
<label>Nama Lengkap</label>
<input type="text" id="nama">
</div>

<div class="input-group">
<label>NIP / NIPP</label>
<input type="text" id="nip">
</div>

<div class="input-group">
<label>Asal Tamu</label>
<input type="text" id="asal">
</div>

<div class="input-group">
<label>Nomor HP</label>
<input type="text" id="hp">
</div>

<div class="input-group">
<label>Keperluan</label>

<select id="keperluan">
<option>Monitoring</option>
<option>Maintenance</option>
<option>Perbaikan</option>
<option>Instalasi</option>
<option>Audit</option>
<option>Kunjungan</option>
<option>Lainnya</option>
</select>

</div>

<div class="input-group">
<label>Email</label>
<input type="email" id="email">
</div>

<div class="input-group full">
<label>Upload Foto</label>
<input type="file" id="foto">
</div>

</div>

<button onclick="kirimData()">
Kirim Permohonan
</button>

<div id="status" class="status"></div>

<div id="statusPermohonan" style="display:none">

  <h2>⏳ Permohonan Sedang Diproses</h2>

  <p>
    Data Anda berhasil dikirim.
  </p>

  <p>
    Silakan tunggu persetujuan dari admin.
  </p>

</div>

</div>

</div>

<script>

const API =
  "https://backendlogakses-production.up.railway.app"

async function kirimData(){

    console.log("KIRIM DATA DIKLIK")

  try {

    document.getElementById("status").innerHTML =
      "Mengirim permohonan..."

    const formData = new FormData()

    formData.append(
      "nama",
      document.getElementById("nama").value
    )

    formData.append(
      "nip",
      document.getElementById("nip").value
    )

    formData.append(
      "asal_tamu",
      document.getElementById("asal").value
    )

    formData.append(
      "no_hp",
      document.getElementById("hp").value
    )

    formData.append(
      "email",
      document.getElementById("email").value
    )

    formData.append(
      "keperluan",
      document.getElementById("keperluan").value
    )

    const foto =
      document.getElementById("foto")

    if (foto.files.length > 0) {
      formData.append(
        "foto",
        foto.files[0]
      )
    }

    const res = await fetch(
      `${API}/tamu/permohonan`,
      {
        method:"POST",
        body:formData
      }
    )

    const data = await res.json()

    if(data.success){

      document.getElementById("status").innerHTML =
        "⏳ Permohonan berhasil dikirim. Menunggu persetujuan admin."

    } else {

      document.getElementById("status").innerHTML =
        "❌ Gagal mengirim permohonan"

    }

  } catch(err){

    console.log(err)

    document.getElementById("status").innerHTML =
      "❌ Server tidak dapat diakses"

  }

}

</script>

</body>
</html>
