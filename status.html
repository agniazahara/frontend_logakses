<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Status Permohonan</title>

<style>

body{
  margin:0;
  background:#f5f7fb;
  font-family:Arial,sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background:#fff;
  padding:40px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,.08);
  text-align:center;
  max-width:500px;
}

.status{
  font-size:70px;
}

h1{
  margin-top:10px;
}

.info{
  color:#666;
  margin-top:15px;
}

</style>
</head>
<body>

<div class="card">

<div class="status" id="iconStatus">⏳</div>

<h1 id="judulStatus">Menunggu Persetujuan</h1>

<p class="info">
Permohonan Anda berhasil dikirim.
</p>

<p class="info">
Silakan tunggu admin memverifikasi data Anda.
</p>

</div>

<script>

const API =
  "https://backendlogakses-production.up.railway.app"

const id =
  localStorage.getItem("permohonanId")

async function cekStatus() {

  if (!id) return

  try {

    const res = await fetch(
      `${API}/tamu/permohonan/status/${id}`
    )

    const data = await res.json()

    if (data.status === "DISETUJUI") {

  document.getElementById("iconStatus").innerHTML =
    "✅"

  document.getElementById("judulStatus").innerHTML =
    "Permohonan Disetujui"

}

if (data.status === "DITOLAK") {

  document.getElementById("iconStatus").innerHTML =
    "❌"

  document.getElementById("judulStatus").innerHTML =
    "Permohonan Ditolak"

}

  } catch(err) {
    console.log(err)
  }

}

setInterval(cekStatus, 5000)

cekStatus()

</script>

</body>
</html>
